<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luna Visor</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Luna Visor</h2>
      </div>
      <button id="btn-all-files" class="sidebar-item active">All Files</button>
      <div id="client-list"></div>
      <button id="btn-add-client" class="sidebar-add">+ New Client</button>
    </aside>

    <main class="main">
      <div class="toolbar">
        <div class="toolbar-left">
          <h3 id="current-view-title">All Files</h3>
        </div>
        <div class="toolbar-center">
          <div class="size-toggle">
            <button class="size-btn active" data-size="normal">Normal</button>
            <button class="size-btn" data-size="big">Big</button>
            <button class="size-btn" data-size="bigger">Bigger</button>
          </div>
          <div class="sort-controls">
            <button class="sort-btn active" data-sort="created_at">Date <span class="sort-arrow">&darr;</span></button>
            <button class="sort-btn" data-sort="original_name">Name <span class="sort-arrow"></span></button>
            <button class="sort-btn" data-sort="type">Type <span class="sort-arrow"></span></button>
          </div>
          <button class="group-btn" id="btn-group-date">Group</button>
        </div>
        <div class="toolbar-right">
          <button id="btn-api-keys" class="btn-secondary">API Keys</button>
          <button id="btn-upload" class="btn-primary">Upload</button>
          <button id="btn-logout" class="btn-secondary">Logout</button>
        </div>
      </div>

      <div id="gallery" class="gallery">
        <p class="empty-state">Select a client or upload files to get started.</p>
      </div>

      <div id="upload-zone" class="upload-zone" hidden>
        <div class="upload-overlay">
          <p>Drop files here or click to select</p>
          <p class="upload-hint">or press <kbd>Ctrl+V</kbd> to paste from clipboard</p>
          <p class="upload-limit">Max file size: 500 MB</p>
          <input type="file" id="file-input" multiple accept="image/*,video/*">
          <div id="upload-progress"></div>
          <button id="btn-close-upload" class="btn-secondary">Close</button>
        </div>
      </div>
    </main>
  </div>

  <div id="context-menu" class="context-menu" hidden>
    <ul id="context-menu-items"></ul>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/clipboard.js"></script>
  <script src="/js/context-menu.js"></script>
  <script src="/js/gallery.js"></script>
  <script src="/js/sort.js"></script>
  <script src="/js/selection.js"></script>
  <script src="/js/upload.js"></script>
  <script src="/js/api-keys.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
